# Reusable tenant login — tap Email/Password labels, type in each field
appId: com.lalarente.app
---
- assertVisible: "Welcome Back"
- assertVisible: "Sign in to your account"

- tapOn: "Email"
- inputText: ${TENANT_EMAIL}

- hideKeyboard

- tapOn: "Password"
- inputText: ${TENANT_PASSWORD}

- hideKeyboard
- tapOn: "Sign In"

- extendedWaitUntil:
    visible: "Your tenancy"
    timeout: 20000
