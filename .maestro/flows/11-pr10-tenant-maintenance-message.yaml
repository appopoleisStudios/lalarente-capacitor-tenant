# PR #10 — Maintenance list + message landlord (S2-39, S2-30)
appId: com.lalarente.app
---
- launchApp
- runFlow: ../subflows/login-tenant.yaml

- tapOn: "Maintenance"
- assertVisible: "Maintenance"

- scrollUntilVisible:
    text: "Message landlord"
    direction: DOWN
    timeout: 15000
    optional: true

- tapOn:
    text: "Message landlord"
    index: 0
    optional: true

- extendedWaitUntil:
    visible: "Type a message"
    timeout: 20000
    optional: true
